# =============================================================================
# Config for CFM Index Phase1 with Lips Cross-Attention
#
# Uses CrossAttnCFM which performs cross-attention between infer_cond (Q) and
# lips_feat (K/V) before feeding into the DiT estimator. Pretrained weights
# from IndexTTS2 s2mel checkpoint are loaded for existing modules only.
# New modules (lips_cross_attn) use Gaussian random initialization.
#
# Run (from project root):
#   conda run -n dub3 python dubbing/run.py \
#       --config dubbing/configs/cfm_index_phase1_lips.yaml
# =============================================================================

# --- Experiment identity ---
model_id: phase1_lips
model_name: CFM_Index_Lips
exp_name: null          # null = auto-generate from timestamp + hash
is_training: 1
itr: 1

# --- Data ---
data:
  # Path to the flow dataset root (contains semantic/ and predict_results/)
  flow_dataset_path: /data2/ruixin/datasets/flow_dataset/MELD
  # Cache directory for pre-computed CFM conditions with lips features.
  # null  → <flow_dataset_path>/semantic/cfm_index_lipsfeat_cache  (auto)
  # str   → explicit absolute path
  cache_dir: null
  dataset: cfm_index_phase1_for_lipsfeat
  train_split_ratio: 0.9
  batch_size: 4
  num_workers: 2
  # Audio duration limits (seconds); longer samples are truncated
  max_ref_sec: 15.0     # maximum reference (prompt) audio duration
  max_gen_sec: 30.0     # maximum target audio duration
  # Maximum number of S_infer token steps (memory safety cap)
  max_code_len: 500
  # TextGrid tier name for phoneme alignment
  tier_name: phones
  # Semantic stretch parameters
  warp_type: semantic       # "semantic" or "cond" — matches SemanticTransformer.input_type
  grid_sample_mode: nearest  # "nearest" or "bilinear" for semantic stretch
  # Optional: limit number of samples for debugging (null = use all)
  max_samples: null

# --- Frozen sub-model paths (used by ConditionBuilder in the Exp) ---
preprocess:
  # Directory containing IndexTTS2 checkpoints
  model_dir: /data2/ruixin/index-tts2/checkpoints
  # Filenames relative to model_dir
  w2v_stat: wav2vec2bert_stats.pt
  s2mel_checkpoint: s2mel.pth
  # Conversion factor: S_infer token count → mel frame count
  # mel_ratio = sample_rate / (token_rate * hop_length) = 22050 / (50 * 256) ≈ 1.7227
  mel_ratio: 1.72265625
  # Sample rate for reference audio used by w2v-bert / CAMPPlus (16 kHz)
  sr_ref_16k: 16000
  # Cache batch size for building condition cache
  cache_batch_size: 16
  # Mel spectrogram parameters (passed to get_mel_spectrogram from meldataset.py)
  mel:
    n_fft: 1024
    num_mels: 80
    sampling_rate: 22050
    hop_size: 256
    win_size: 1024
    fmin: 0
    fmax: null

# --- IndexTTS2 s2mel CFM model architecture ---
# Taken verbatim from index-tts2/checkpoints/config.yaml → s2mel block.
# These values are used to instantiate dubbing.modules.cfm_index.CrossAttnCFM.
model:
  dit_type: "DiT"
  reg_loss_type: "l1"

  # Multi-conditional Classifier-Free Guidance rates (for CrossAttnCFM)
  # These are mutually exclusive dropout probabilities during training:
  # - conds_cfg_rate: probability of dropping infer_cond (query in LipsTransformer)
  # - lips_cfg_rate: probability of dropping lips_feat (context in LipsTransformer)
  # - class_dropout_prob (DiT): probability of joint dropout (all conditions in DiT)
  conds_cfg_rate: 0.1
  lips_cfg_rate: 0.1

  DiT:
    hidden_dim: 512
    num_heads: 8
    depth: 13
    class_dropout_prob: 0.1
    block_size: 8192
    in_channels: 80
    style_condition: true
    final_layer_type: "wavenet"
    target: "mel"
    content_dim: 512
    content_codebook_size: 1024
    content_type: "discrete"
    f0_condition: false
    n_f0_bins: 512
    content_codebooks: 1
    is_causal: false
    long_skip_connection: true
    zero_prompt_speech_token: false
    time_as_token: false
    style_as_token: false
    uvit_skip_connection: true
    add_resblock_in_transformer: false

  wavenet:
    hidden_dim: 512
    num_layers: 8
    kernel_size: 5
    dilation_rate: 1
    p_dropout: 0.2
    style_condition: true

  style_encoder:
    dim: 192

# --- Training hyperparameters ---
training:
  epochs: 40
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  max_grad_norm: 1.0
  lr_scheduler: cosine      # linear | cosine
  lr_min: 1.0e-6
  early_stop_patience: 10
  # CFM inference parameters (used during test/evaluate)
  inference_steps: 10
  inference_cfg_rate: 0.7
  # Max batches for inference+save during train/test
  train_infer_max_batches: 4
  test_infer_max_batches: 8

# --- System ---
system:
  seed: 2026
  log_level: DEBUG          # DEBUG | INFO | WARNING | ERROR
  checkpoints: /data2/ruixin/Dubbing/checkpoints
  use_gpu: true
  gpu: 0
  use_multi_gpu: false
  devices: "0,1,2,3"
